version: '3.8'

services:

  # ─── Dev container ────────────────────────────────────────────────────────────
  app:
    image: ghcr.io/ajwadtahmid/devenv:latest
    volumes:
      - ..:/workspace:cached               # Project root (one level up from .devcontainer/)
      - ~/.ssh:/home/dev/.ssh:ro           # SSH keys for git over SSH
      - ~/.gitconfig:/home/dev/.gitconfig:ro
    command: sleep infinity                # Keep the container alive with no foreground process
    environment:
      # Pre-set connection strings so frameworks can find the databases without config
      - POSTGRES_URL=postgresql://dev:dev@postgres:5432/devdb
      - MYSQL_URL=mysql://dev:dev@mysql:3306/devdb
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://dev:dev@mongo:27017/devdb
      # SQLITE_PATH is just a convention — SQLite is a file, not a server.
      # Your app writes to any path inside /workspace.
      - SQLITE_PATH=/workspace/db.sqlite3
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: devdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"     # Also exposed to host so you can connect with TablePlus / DataGrip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d devdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MySQL ────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootdev
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev
      MYSQL_DATABASE: devdb
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "dev", "-pdev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: dev
      MONGO_INITDB_ROOT_PASSWORD: dev
      MONGO_INITDB_DATABASE: devdb
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

# ─── Named volumes ────────────────────────────────────────────────────────────
# Named volumes persist data across container rebuilds and stops.
# To wipe a database and start fresh, delete the corresponding volume:
#   docker volume rm .devcontainer_postgres_data   (or mysql_data, redis_data, mongo_data)
volumes:
  postgres_data:
  mysql_data:
  redis_data:
  mongo_data:
